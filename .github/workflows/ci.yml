name: CI

on:
  pull_request:
    branches: [main]
  merge_group:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python-runtime:
    name: API workflow and control-plane tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          enable-cache: true

      - name: Install Python dependencies
        working-directory: services/api
        run: uv sync --group dev

      - name: Lint
        working-directory: services/api
        run: uv run ruff check api/

      - name: Compile
        working-directory: services/api
        run: uv run python -m compileall -q api/

      - name: Targeted API tests
        working-directory: services/api
        run: |
          uv run pytest -q \
            tests/test_workflows.py::test_create_slack_thread_turn_workflow_eager_start \
            tests/test_workflows.py::test_slack_thread_turn_active_assignment_does_not_backfill_stop_history \
            tests/test_workflows.py::test_cancel_workflow_run_cancels_linked_execution \
            tests/test_agent_control_plane.py::test_cancel_execution_stops_runtime_and_clears_inflight \
            tests/test_agent_control_plane.py::test_steer_stdin_interrupts_amp_before_injecting \
            tests/test_agent_control_plane.py::test_worker_stops_session_when_cancel_requested_mid_stream \
            tests/test_agent_control_plane.py::test_worker_maps_amp_user_cancelled_error_to_cancelled

  tool-cli-tests:
    name: Tool-CLI migration safety net
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          enable-cache: true

      - name: Install Python dependencies
        working-directory: services/api
        run: uv sync --group dev

      # The tool-execution path (call.sh -> runner/sidecar), its packaging, and
      # the shared invocation core are otherwise uncovered by CI. These guard
      # the tool-CLI migration so a regression in dispatch, routing, arg
      # validation, TOON output, discovery, or secret resolution fails the PR.
      - name: API + local-runner tests
        working-directory: services/api
        # api.config requires DATABASE_URL at import. None of these tests open a
        # real connection (they are unit/wiring/subprocess tests, none request
        # the DB fixtures), so a deterministic dummy DSN is enough — and it is
        # the value test_tool_server_core_pg asserts the proxied DSN inherits.
        env:
          DATABASE_URL: postgresql://app_user:pw@db:5432/ai_v2
        # test_tool_server_core_pg reads the cached api.config.settings singleton;
        # test_sandbox_kubernetes_backend mutates DATABASE_URL in-session, so the
        # former runs first to read the job's DSN cleanly (pre-existing test-order
        # coupling, unrelated to this change).
        run: |
          uv run pytest -q \
            tests/test_tool_server_core_pg.py \
            tests/test_tool_manager.py \
            tests/test_call_sh.py \
            tests/test_sandbox_kubernetes_backend.py \
            tests/test_amp_wrapper.py \
            tests/test_claude_app_wrapper.py \
            tests/test_codex_app_wrapper.py \
            tests/test_toolrunner_parity.py

      - name: SDK + shared-runner unit tests
        run: |
          services/api/.venv/bin/python -m pytest -q \
            centaur_sdk/tests/test_tool_sdk.py \
            centaur_sdk/tests/test_toolrunner.py

      - name: Lint centaur_sdk (incl. the local runner)
        run: services/api/.venv/bin/ruff check centaur_sdk/

  slackbot-targeted-tests:
    name: Slackbot interface and delivery tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.28.1
          run_install: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Targeted Slackbot tests
        working-directory: services/slackbot
        run: |
          bun test \
            src/centaur/handoff.test.ts \
            src/slack/normalize.test.ts \
            src/centaur/final-delivery.test.ts
