line-length = 100
target-version = "py311"

[lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF", "TID", "T201"]
ignore = ["E501", "TID251"]

[lint.isort]
known-first-party = ["centaur_sdk"]

[lint.per-file-ignores]
# toolrunner exposes the ``centaur-tool`` CLI; its main() prints results to
# stdout by design (that IS the tool's output contract).
"toolrunner.py" = ["T201"]
