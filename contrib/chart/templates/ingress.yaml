{{- $ingressComponent := "slackbotv2" -}}
{{- if and .Values.zulipbot.enabled (not .Values.slackbotv2.enabled) -}}
{{- $ingressComponent = "zulipbot" -}}
{{- end -}}
{{- $ingressPort := ternary 3002 3001 (eq $ingressComponent "zulipbot") -}}
{{- if and .Values.ingress.enabled (or .Values.slackbotv2.enabled .Values.zulipbot.enabled) }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "centaur.componentName" (dict "root" . "component" $ingressComponent) }}
  labels:
{{ include "centaur.componentLabels" (dict "root" . "component" $ingressComponent) | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
{{ toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.defaultBackend }}
  defaultBackend:
    service:
      name: {{ include "centaur.componentName" (dict "root" . "component" $ingressComponent) }}
      port:
        number: {{ $ingressPort }}
  {{- else }}
  rules:
    - {{- if .Values.ingress.host }}
      host: {{ .Values.ingress.host | quote }}
      {{- end }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "centaur.componentName" (dict "root" . "component" $ingressComponent) }}
                port:
                  number: {{ $ingressPort }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
{{ toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
